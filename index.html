<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stack Jump</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #06060f;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: sans-serif;
    }

    #game-wrapper {
      position: relative;
      /* Maintain 960:600 (8:5) aspect ratio, fit inside viewport */
      width:  min(100vw, calc(100vh * 1.6));
      height: min(100vh, calc(100vw / 1.6));
      background: #06060f;
    }

    #unity-canvas {
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      display: block;
      cursor: pointer;
      outline: none;
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #06060f;
      color: #cde;
      gap: 18px;
      transition: opacity 0.5s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }

    #loading-title {
      font-size: clamp(20px, 4vw, 36px);
      font-weight: bold;
      letter-spacing: 3px;
      color: #4cf;
      text-shadow: 0 0 20px #08f;
    }

    #progress-track {
      width: min(280px, 70vw);
      height: 6px;
      background: #1a2040;
      border-radius: 3px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #08f, #0df);
      border-radius: 3px;
      transition: width 0.15s;
    }
    #loading-pct { font-size: 14px; color: #789; }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="unity-canvas" tabindex="1"></canvas>
    <div id="loading-overlay">
      <div id="loading-title">⚡ STACK JUMP</div>
      <div id="progress-track"><div id="progress-fill"></div></div>
      <div id="loading-pct">Yükleniyor...</div>
    </div>
  </div>

  <script>
    var canvas  = document.getElementById("unity-canvas");
    var wrapper = document.getElementById("game-wrapper");
    var overlay = document.getElementById("loading-overlay");
    var pFill   = document.getElementById("progress-fill");
    var pPct    = document.getElementById("loading-pct");

    // Pixel-perfect canvas resize matching wrapper
    function resizeCanvas() {
      var w = Math.round(wrapper.clientWidth);
      var h = Math.round(wrapper.clientHeight);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width  = w;
        canvas.height = h;
      }
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    // Keep canvas focused — Unity needs this to receive all mouse/touch input
    function focusCanvas() { canvas.focus(); }
    focusCanvas();
    document.addEventListener("pointerdown", focusCanvas);

    var buildUrl = "Build";
    var config = {
      dataUrl:            buildUrl + "/WebGL.data",
      frameworkUrl:       buildUrl + "/WebGL.framework.js",
      codeUrl:            buildUrl + "/WebGL.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName:        "MobileGameFactory",
      productName:        "Stack Jump",
      productVersion:     "0.1.0",
      matchWebGLToCanvasSize: false,
    };

    var script = document.createElement("script");
    script.src = buildUrl + "/WebGL.loader.js";
    script.onload = function () {
      createUnityInstance(canvas, config, function (progress) {
        var pct = Math.round(progress * 100);
        pFill.style.width = pct + "%";
        pPct.textContent  = pct + "%";
      }).then(function (instance) {
        overlay.classList.add("hidden");
        setTimeout(function () { overlay.style.display = "none"; }, 600);
        focusCanvas();
        canvas.addEventListener("dblclick", function () { instance.SetFullscreen(1); });
      }).catch(function (msg) {
        pPct.textContent = "Hata: " + msg;
        pPct.style.color = "#f44";
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #0a0a18; display: flex; align-items: flex-start; justify-content: center; }
      /* Override Unity template absolute positioning */
      #unity-container,
      #unity-container.unity-desktop { position: relative !important; left: auto !important; top: auto !important; transform: none !important; width: 100% !important; max-width: 960px !important; margin: 0 auto !important; }
      #unity-canvas { width: 100% !important; height: auto !important; aspect-ratio: 960/600 !important; display: block !important; }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Stack Jump</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/WebGL.data",
        frameworkUrl: buildUrl + "/WebGL.framework.js",
        codeUrl: buildUrl + "/WebGL.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "MobileGameFactory",
        productName: "Stack Jump",
        productVersion: "0.1.0",
        showBanner: unityShowBanner,
        // errorHandler: function(err, url, line) {
        //    alert("error " + err + " occurred at line " + line);
        //    // Return 'true' if you handled this error and don't want Unity
        //    // to process it further, 'false' otherwise.
        //    return true;
        // },
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;


      } else {
        // Desktop style: fluid width, let CSS handle sizing
        canvas.style.width = "";
        canvas.style.height = "";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  unityInstance.SetFullscreen(1);
                };
                // Auto-focus canvas so Unity receives input immediately
                canvas.focus();
                // Show tap hint overlay
                var hint = document.createElement("div");
                hint.id = "tap-hint";
                hint.innerText = "▶  TAP TO PLAY";
                hint.style.cssText = "position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);" +
                  "color:#fff;font-size:22px;font-family:sans-serif;font-weight:bold;pointer-events:none;" +
                  "text-shadow:0 0 12px #0af;letter-spacing:2px;animation:pulse 1.2s ease-in-out infinite;";
                var style = document.createElement("style");
                style.textContent = "@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}";
                document.head.appendChild(style);
                canvas.parentElement.style.position = "relative";
                canvas.parentElement.appendChild(hint);
                canvas.addEventListener("mousedown", function(){ 
                  var h = document.getElementById("tap-hint");
                  if(h) h.remove();
                  canvas.focus();
                }, {once: false});
              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  </body>
</html>
